<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체육 시간 대탐험</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#202B38; --ink2:#33414F;
  --ivory:#F8F3E8; --paper:#EFE6D3;
  --gold:#C99A3F; --gold-deep:#94702A; --gold-soft:#E8C77E;
  --sage:#87A47E; --sage-deep:#5F7D58;
  --clay:#C97F5E; --slate:#54708C;
  --night:#11181F; --glass:rgba(17,24,31,.82);
  --shadow-lg:0 24px 48px -20px rgba(10,15,22,.55);
  --shadow-sm:0 6px 18px -8px rgba(10,15,22,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'IBM Plex Sans KR',sans-serif;background:var(--night);color:var(--ink);
  user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.serif{font-family:'Gowun Batang',serif;}
button{border:none;cursor:pointer;font-family:inherit;}
button:focus-visible,.card:focus-visible{outline:3px solid #7FB3E8;outline-offset:3px;}
body.reduceMotion *,body.reduceMotion *::before,body.reduceMotion *::after{
  animation-duration:.001s !important;animation-iteration-count:1 !important;transition-duration:.001s !important;}

.screen{position:fixed;inset:0;display:none;}
.screen.on{display:flex;}

/* ── 공용 버튼 ── */
.btnGold{font-family:'Gowun Batang',serif;font-weight:700;color:#2A2008;letter-spacing:.02em;
  background:linear-gradient(180deg,#EBCB83 0%,#C99A3F 58%,#B5872F 100%);
  border-radius:999px;box-shadow:inset 0 1px 0 rgba(255,248,228,.75),0 10px 22px -10px rgba(140,100,30,.7);
  transition:transform .15s ease,box-shadow .15s ease;}
.btnGold:hover{transform:translateY(-2px);box-shadow:inset 0 1px 0 rgba(255,248,228,.75),0 14px 26px -10px rgba(140,100,30,.75);}
.btnGold:active{transform:translateY(1px);box-shadow:inset 0 2px 6px rgba(90,60,10,.45);}
.btnGhost{background:rgba(248,243,232,.08);color:var(--ivory);border:1px solid rgba(248,243,232,.35);
  border-radius:999px;transition:background .15s;}
.btnGhost:hover{background:rgba(248,243,232,.16);}

/* ── 패널 ── */
.panel{position:relative;background:linear-gradient(180deg,#FBF7EE 0%,#F3EBDB 100%);
  border:1px solid rgba(32,43,56,.16);border-radius:20px;box-shadow:var(--shadow-lg);}
.panel::before{content:"";position:absolute;top:0;left:24px;right:24px;height:3px;border-radius:0 0 4px 4px;
  background:linear-gradient(90deg,transparent,var(--gold) 18%,var(--gold) 82%,transparent);}
.eyebrow{font-size:11.5px;letter-spacing:.34em;color:var(--gold-deep);font-weight:600;text-transform:uppercase;}

/* ═══════════ 시작 화면 ═══════════ */
#titleScreen{flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(180deg,#27384B 0%,#41566B 34%,#9D8163 62%,#C9A36B 78%,#8DA37E 100%);}
#titleArt{position:absolute;inset:0;pointer-events:none;}
#titleInner{position:relative;display:flex;flex-direction:column;align-items:center;gap:18px;padding:28px;
  animation:riseIn 1.1s ease both;}
@keyframes riseIn{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
#titleInner .eyebrow{color:#EAD9A8;}
#titleScreen h1{font-family:'Gowun Batang',serif;font-weight:700;color:var(--ivory);
  font-size:clamp(30px,6.4vw,58px);line-height:1.3;text-shadow:0 4px 24px rgba(10,14,20,.55);}
#titleRule{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-soft),transparent);}
#titleScreen .sub{color:#EFE3C8;font-size:clamp(14px,2.2vw,17px);letter-spacing:.06em;}
#startBtn{font-size:clamp(17px,2.6vw,21px);padding:16px 52px;margin-top:10px;}
.hintRow{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:6px;}
.hintRow span{font-size:12.5px;color:#D9CDB2;border:1px solid rgba(233,217,168,.3);border-radius:999px;padding:5px 14px;letter-spacing:.04em;}

/* ═══════════ 게임 화면 ═══════════ */
#gameScreen{background:#71885F;}
#view{position:absolute;inset:0;overflow:hidden;}
#view::after{content:"";position:absolute;inset:0;pointer-events:none;
  box-shadow:inset 0 0 160px rgba(15,22,16,.5);}
#world{position:absolute;top:0;left:0;width:1280px;height:960px;transform-origin:0 0;will-change:transform;}
#worldSVG{position:absolute;inset:0;}
#sprites{position:absolute;inset:0;pointer-events:none;}
#view,#joy{touch-action:none;}
.footstep{position:absolute;width:24px;height:24px;opacity:.92;transform:rotate(var(--rot));pointer-events:none;
  filter:drop-shadow(0 1px 2px rgba(60,45,10,.4));}
#player{position:absolute;width:64px;height:76px;margin:-66px 0 0 -32px;z-index:5;}
#player.walk #playerSVG{animation:walkBob .38s ease-in-out infinite;}
@keyframes walkBob{0%,100%{transform:translateY(0) var(--flip)}50%{transform:translateY(-4px) var(--flip)}}
#playerSVG{transform:var(--flip);}
.zoneStar{position:absolute;width:54px;height:54px;margin:-27px 0 0 -27px;pointer-events:none;
  animation:zoneFloat 4.2s ease-in-out infinite;}
@keyframes zoneFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

/* HUD */
#hud{position:absolute;inset:0;pointer-events:none;z-index:20;}
.chip{background:var(--glass);border:1px solid rgba(248,243,232,.16);border-radius:14px;
  box-shadow:var(--shadow-sm);backdrop-filter:blur(8px);}
#starBar{position:absolute;top:14px;left:14px;display:flex;gap:7px;padding:10px 16px;}
#starBar svg{width:21px;height:21px;}
#starBar .slot .fill{opacity:0;transition:opacity .4s;}
#starBar .slot.got .fill{opacity:1;}
#starBar .slot.got{animation:starPop .5s ease;}
@keyframes starPop{0%{transform:scale(.4)}65%{transform:scale(1.45)}100%{transform:scale(1)}}
#goalBanner{position:absolute;top:14px;left:50%;transform:translateX(-50%);max-width:min(72vw,520px);
  padding:10px 22px;font-family:'Gowun Batang',serif;font-weight:700;color:var(--ivory);
  font-size:clamp(13.5px,2vw,16.5px);letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#goalBanner b{color:var(--gold-soft);font-weight:700;margin-right:8px;}
#hudBtns{position:absolute;top:14px;right:14px;display:flex;gap:8px;pointer-events:auto;}
.hudBtn{width:44px;height:44px;border-radius:12px;background:var(--glass);border:1px solid rgba(248,243,232,.16);
  display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);backdrop-filter:blur(8px);}
.hudBtn svg{width:21px;height:21px;stroke:var(--ivory);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.hudBtn.off svg{stroke:#7E8A96;}
.hudBtn.off{border-color:rgba(248,243,232,.07);}
#joy{position:absolute;left:22px;bottom:22px;width:128px;height:128px;border-radius:50%;
  background:rgba(17,24,31,.35);border:1.5px solid rgba(248,243,232,.28);pointer-events:auto;display:none;backdrop-filter:blur(4px);}
#joyKnob{position:absolute;left:50%;top:50%;width:54px;height:54px;margin:-27px 0 0 -27px;border-radius:50%;
  background:linear-gradient(180deg,#F8F3E8,#D9CDB2);box-shadow:0 4px 10px rgba(10,15,22,.45);}
body.touch #joy{display:block;}
#tapHint{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);padding:8px 18px;
  color:#D9CDB2;font-size:13px;letter-spacing:.04em;transition:opacity .8s;}

/* ── 대화 상자 ── */
#dialogBox{position:absolute;left:50%;bottom:max(4vh,22px);transform:translateX(-50%);
  width:min(92vw,620px);padding:20px 24px 18px;z-index:30;display:none;}
#dialogBox.on{display:block;animation:dlgIn .3s ease;}
@keyframes dlgIn{from{transform:translate(-50%,16px);opacity:0}to{transform:translate(-50%,0);opacity:1}}
#dialogBox .who{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
#dialogBox .face{width:48px;height:48px;border-radius:50%;background:#E8E0CC;
  border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;overflow:hidden;}
#dialogBox .name{font-size:12px;letter-spacing:.3em;color:var(--gold-deep);font-weight:600;}
#dialogText{font-family:'Gowun Batang',serif;font-size:clamp(15.5px,2.4vw,18.5px);line-height:1.8;min-height:3.4em;color:var(--ink);}
#dialogNext{display:block;margin:12px 0 0 auto;font-size:15.5px;padding:11px 30px;}

/* ── 선택 화면 ── */
#choiceScreen{background:rgba(12,17,24,.74);backdrop-filter:blur(7px);flex-direction:column;
  align-items:center;justify-content:center;gap:20px;padding:18px;z-index:40;}
#choiceQ{font-family:'Gowun Batang',serif;font-weight:700;color:var(--ivory);text-align:center;
  font-size:clamp(19px,3.2vw,27px);line-height:1.5;max-width:92vw;padding-bottom:14px;position:relative;}
#choiceQ::after{content:"";position:absolute;left:50%;bottom:0;transform:translateX(-50%);
  width:74px;height:1px;background:linear-gradient(90deg,transparent,var(--gold-soft),transparent);}
#cards{display:flex;gap:clamp(12px,3vw,30px);align-items:stretch;justify-content:center;width:100%;max-width:880px;}
.card{position:relative;flex:1;max-width:396px;background:#FBF7EE;border:1px solid rgba(32,43,56,.2);
  border-radius:16px;overflow:hidden;box-shadow:var(--shadow-lg);transition:transform .18s ease,box-shadow .18s ease;
  display:flex;flex-direction:column;padding:0;text-align:left;}
@media (hover:hover){.card:hover{transform:translateY(-6px);box-shadow:0 30px 54px -22px rgba(10,15,22,.7);}}
.card:active{transform:scale(.985);}
.card svg{width:100%;height:auto;display:block;}
.card .cap{font-family:'Gowun Batang',serif;font-weight:700;font-size:clamp(13.5px,2.2vw,16.5px);
  padding:13px 16px;background:var(--ink);color:var(--ivory);line-height:1.55;letter-spacing:.01em;}
.card.hintGlow{border:2px solid var(--gold);box-shadow:0 0 0 5px rgba(201,154,63,.35),var(--shadow-lg);}
.hintBadge{position:absolute;top:10px;left:10px;z-index:2;font-size:12px;font-weight:600;letter-spacing:.05em;
  background:linear-gradient(180deg,#EBCB83,#C99A3F);color:#2A2008;padding:6px 12px;border-radius:999px;
  box-shadow:0 4px 10px rgba(90,60,10,.4);}
#choiceHint{color:#E3D5AE;font-size:14px;min-height:1.5em;text-align:center;letter-spacing:.03em;}

/* ── 피드백 ── */
#fbScreen{background:rgba(12,17,24,.66);backdrop-filter:blur(5px);align-items:center;justify-content:center;z-index:50;padding:16px;}
#fbCard{width:min(92vw,540px);padding:30px 30px 26px;text-align:center;animation:dlgPop .32s ease;}
@keyframes dlgPop{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
#fbMark{width:64px;height:64px;margin:0 auto 4px;}
#fbTitle{font-family:'Gowun Batang',serif;font-weight:700;font-size:clamp(20px,3.2vw,26px);margin:10px 0 8px;}
#fbText{font-size:clamp(14.5px,2.2vw,17px);line-height:1.85;color:var(--ink2);}
#fbBtn{margin-top:20px;font-size:16px;padding:12px 38px;}
#fbCard.good #fbTitle{color:#5F7D58;}
#fbCard.retry #fbTitle{color:#B0623F;}

/* ═══════════ 미니게임 ═══════════ */
#miniScreen{flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:45;padding:14px;
  background:radial-gradient(120% 100% at 50% 0%,#28333F 0%,#161E27 58%,#0E141B 100%);}
#mgHead{display:flex;align-items:baseline;gap:14px;color:var(--ivory);}
#mgHead .eyebrow{color:#C9B27E;}
#mgTitle{font-family:'Gowun Batang',serif;font-weight:700;font-size:clamp(18px,3vw,25px);}
#mgRow{display:flex;gap:10px;align-items:center;width:min(94vw,860px);justify-content:space-between;}
#miniCount{font-family:'Gowun Batang',serif;font-weight:700;font-size:clamp(18px,3vw,24px);color:var(--ivory);
  padding:8px 20px;}
#miniCount small{font-size:.62em;color:#A8B2BC;font-weight:400;margin-left:4px;}
#miniMsg{font-size:clamp(12.5px,1.9vw,14.5px);color:#D9CDB2;padding:9px 18px;letter-spacing:.02em;
  max-width:58%;text-align:right;}
#court{position:relative;width:min(94vw,860px);aspect-ratio:16/9;max-height:56vh;border-radius:18px;overflow:hidden;
  border:1px solid rgba(248,243,232,.14);box-shadow:var(--shadow-lg),inset 0 0 80px rgba(8,12,17,.35);}
#courtBG{position:absolute;inset:0;width:100%;height:100%;}
#shuttle{position:absolute;left:0;top:0;width:52px;height:52px;margin:-26px 0 0 -26px;display:none;will-change:transform;z-index:6;}
#shuttle.show{display:block;}
#shShadow{position:absolute;width:44px;height:12px;margin:-6px 0 0 -22px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(10,14,18,.5),transparent);display:none;z-index:2;}
#shShadow.show{display:block;}
.trailDot{position:absolute;width:10px;height:10px;margin:-5px;border-radius:50%;
  background:radial-gradient(closest-side,rgba(248,243,232,.55),transparent);pointer-events:none;z-index:5;}
#hitZone{position:absolute;left:21%;bottom:9%;width:21%;height:9%;border-radius:50%;z-index:1;
  border:2px dashed rgba(232,199,126,.35);background:rgba(232,199,126,.07);transition:all .25s ease;}
#hitZone.ready{border-color:rgba(232,199,126,.95);background:rgba(232,199,126,.22);
  box-shadow:0 0 26px rgba(232,199,126,.35);}
#zoneLabel{position:absolute;left:50%;top:-30px;transform:translateX(-50%);font-family:'Gowun Batang',serif;
  font-weight:700;font-size:14px;color:var(--gold-soft);opacity:0;transition:opacity .2s;letter-spacing:.1em;}
#hitZone.ready #zoneLabel{opacity:1;}
#mgKid{position:absolute;left:4.5%;bottom:5%;width:clamp(96px,17%,160px);z-index:4;}
#mgKid .racketArm{transform-box:fill-box;transform-origin:30% 88%;transition:transform .16s cubic-bezier(.3,1.6,.5,1);}
#mgKid.swing .racketArm{transform:rotate(-52deg);}
.impactRing{position:absolute;width:18px;height:18px;margin:-9px;border-radius:50%;z-index:7;
  border:2.5px solid rgba(232,199,126,.9);animation:ringOut .5s ease-out forwards;pointer-events:none;}
@keyframes ringOut{from{transform:scale(.4);opacity:1}to{transform:scale(4.2);opacity:0}}
.pangTxt{position:absolute;font-family:'Gowun Batang',serif;font-weight:700;font-size:30px;color:var(--gold-soft);
  text-shadow:0 2px 10px rgba(0,0,0,.5);animation:pangUp .6s ease forwards;pointer-events:none;z-index:8;}
@keyframes pangUp{from{transform:translate(-50%,0);opacity:1}to{transform:translate(-50%,-58px);opacity:0}}
#racketBtn{font-size:clamp(17px,2.8vw,21px);padding:15px 0;width:min(70vw,340px);letter-spacing:.06em;}

/* ═══════════ 보상 화면 ═══════════ */
#rewardScreen{flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;z-index:60;
  padding:26px 16px 40px;gap:16px;
  background:radial-gradient(90% 64% at 50% 0%,#3B4A5C 0%,#1C2630 52%,#10161D 100%);}
#rwEyebrow{color:#C9B27E;}
#rwTitle{font-family:'Gowun Batang',serif;font-weight:700;color:var(--ivory);
  font-size:clamp(26px,5vw,42px);text-align:center;line-height:1.3;text-shadow:0 4px 20px rgba(0,0,0,.5);}
#rwStage{position:relative;width:min(86vw,440px);height:min(48vw,266px);flex:none;}
#spotlight{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:120%;height:130%;
  background:radial-gradient(60% 90% at 50% 100%,rgba(232,199,126,.22),transparent 70%);pointer-events:none;}
#podium{position:absolute;left:50%;bottom:0;transform:translateX(-50%);width:62%;height:15%;}
#rwKidBox{position:absolute;left:50%;bottom:11%;transform:translateX(-50%);width:42%;}
.crownStar{position:absolute;width:34px;height:34px;opacity:0;transform:translateY(-160px) scale(.4);
  transition:transform .8s cubic-bezier(.2,1.3,.4,1),opacity .5s;filter:drop-shadow(0 3px 8px rgba(232,180,80,.5));}
.crownStar.land{opacity:1;transform:translateY(0) scale(1);}
#trophyBox{display:flex;flex-direction:column;align-items:center;gap:10px;opacity:0;transform:scale(.6);
  transition:transform .7s cubic-bezier(.2,1.5,.4,1),opacity .5s;}
#trophyBox.show{opacity:1;transform:scale(1);}
#trophySVG{width:clamp(78px,13vw,108px);filter:drop-shadow(0 8px 22px rgba(201,154,63,.4));}
#trophyLabel{font-family:'Gowun Batang',serif;font-weight:700;color:var(--gold-soft);letter-spacing:.14em;
  font-size:clamp(15px,2.6vw,19px);border-top:1px solid rgba(232,199,126,.4);border-bottom:1px solid rgba(232,199,126,.4);
  padding:7px 22px;}
#review{width:min(92vw,560px);padding:22px 22px 18px;text-align:center;}
#review h3{font-family:'Gowun Batang',serif;font-size:clamp(16px,2.8vw,20px);margin:6px 0 14px;}
#reviewCard svg{width:100%;max-width:380px;height:auto;border-radius:12px;border:1px solid rgba(32,43,56,.2);}
#reviewCap{font-family:'Gowun Batang',serif;font-weight:700;font-size:clamp(14px,2.4vw,17px);
  margin:12px 0;min-height:2.6em;line-height:1.6;}
#reviewNav{display:flex;gap:12px;justify-content:center;align-items:center;}
#reviewNav button{font-size:14px;padding:9px 22px;color:var(--ink);background:#E8E0CC;border-radius:999px;
  border:1px solid rgba(32,43,56,.18);transition:background .15s;}
#reviewNav button:hover{background:#DDD2B6;}
#reviewDots{font-size:11px;letter-spacing:4px;color:var(--gold-deep);}
#rwCheer{font-size:clamp(14px,2.3vw,16.5px);line-height:1.9;text-align:center;max-width:560px;color:#E3D8C0;}
#againBtn{font-size:clamp(17px,3vw,21px);padding:16px 52px;}

/* ── 색종이 ── */
.confetti{position:fixed;width:9px;height:15px;top:-22px;z-index:90;pointer-events:none;animation:confFall linear forwards;}
@keyframes confFall{to{transform:translateY(112vh) rotate(620deg);}}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.001s !important;transition-duration:.001s !important;}
}
@media (max-width:600px){
  #cards{flex-direction:column;align-items:center;overflow-y:auto;max-height:70vh;}
  .card{width:min(88vw,360px);flex:none;}
  #miniMsg{max-width:50%;}
}
</style>
</head>
<body>

<!-- ═══════════ 시작 화면 ═══════════ -->
<div id="titleScreen" class="screen on">
  <svg id="titleArt" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
    <circle cx="1080" cy="300" r="120" fill="#E8C77E" opacity=".85"/>
    <circle cx="1080" cy="300" r="170" fill="#E8C77E" opacity=".14"/>
    <path d="M0 660 Q240 560 480 640 T960 620 T1440 650 V900 H0 Z" fill="#5E7257" opacity=".75"/>
    <path d="M0 730 Q300 640 620 710 T1440 720 V900 H0 Z" fill="#46584A"/>
    <g opacity=".9">
      <rect x="600" y="560" width="250" height="130" rx="6" fill="#33414F"/>
      <rect x="690" y="500" width="70" height="60" fill="#33414F"/>
      <path d="M680 505 L725 470 L770 505 Z" fill="#2A3642"/>
      <rect x="713" y="478" width="6" height="26" fill="#2A3642"/>
      <circle cx="716" cy="472" r="7" fill="#C99A3F"/>
      <rect x="625" y="590" width="34" height="44" rx="3" fill="#C9B27E" opacity=".8"/>
      <rect x="700" y="590" width="34" height="44" rx="3" fill="#C9B27E" opacity=".55"/>
      <rect x="775" y="590" width="34" height="44" rx="3" fill="#C9B27E" opacity=".8"/>
    </g>
    <path d="M0 820 Q360 770 720 800 T1440 790 V900 H0 Z" fill="#222D27"/>
  </svg>
  <div id="titleInner">
    <span class="eyebrow">Special PE Adventure</span>
    <h1>내 맘대로 움직이는<br>체육 시간 대탐험</h1>
    <div id="titleRule"></div>
    <p class="sub">반짝이는 발자국을 따라, 시간표 약속을 지키는 하루</p>
    <button class="btnGold" id="startBtn">모험 시작</button>
    <div class="hintRow"><span>방향키 · WASD 이동</span><span>가고 싶은 곳을 눌러도 이동</span><span>터치 조이스틱 지원</span></div>
  </div>
</div>

<!-- ═══════════ 게임 화면 ═══════════ -->
<div id="gameScreen" class="screen">
  <div id="view">
    <div id="world">
      <svg id="worldSVG" width="1280" height="960" viewBox="0 0 1280 960" aria-hidden="true"></svg>
      <div id="sprites" aria-hidden="true"></div>
      <div id="player" aria-hidden="true"><div id="playerSVG"></div></div>
    </div>
  </div>

const shadowE=(x,y,rx)=>`<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${rx*0.3}" fill="rgba(40,32,16,.18)"/>`;

let actx=null,sndOn=true,voxOn=true;
function ac(){if(!actx){const A=window.AudioContext||window.webkitAudioContext;if(A)actx=new A();}
  if(actx&&actx.state==="suspended")actx.resume();return actx;}
function beep(f,when,dur,type,vol){const c=ac();if(!c||!sndOn)return;
  const o=c.createOscillator(),g=c.createGain();o.type=type||"sine";o.frequency.value=f;
  const t=c.currentTime+(when||0);g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.14,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g).connect(c.destination);o.start(t);o.stop(t+dur+0.05);}

const sWhoosh=()=>{const c=ac();if(!c||!sndOn)return;const o=c.createOscillator(),g=c.createGain();
  o.type="sine";const t=c.currentTime;o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(220,t+.32);
  g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.0001,t+.34);
  o.connect(g).connect(c.destination);o.start(t);o.stop(t+.4);};
function speak(t){if(!voxOn||!("speechSynthesis"in window))return;
  try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t.replace(/[\u{1F300}-\u{1FAFF}\u{2600}-\u{27BF}·]/gu,""));
  u.lang="ko-KR";u.rate=0.95;u.pitch=1.05;speechSynthesis.speak(u);}catch(e){}}

let stepEls=[],zoneStarEl=null;
function clearPath(){stepEls.forEach(e=>e.remove());stepEls=[];if(zoneStarEl){zoneStarEl.remove();zoneStarEl=null;}}
function showPath(pts){
  clearPath();if(!pts||pts.length<2)return;
  const SP=54;let side=1;
  for(let i=0;i<pts.length-1;i++){
    const [x1,y1]=pts[i],[x2,y2]=pts[i+1],dx=x2-x1,dy=y2-y1,len=Math.hypot(dx,dy),ang=Math.atan2(dy,dx);
    for(let t=0;t<len;t+=SP){
      const ox=Math.cos(ang+Math.PI/2)*9*side,oy=Math.sin(ang+Math.PI/2)*9*side;
      const e=document.createElement("div");e.className="footstep";
      e.style.left=(x1+dx*t/len+ox-12)+"px";e.style.top=(y1+dy*t/len+oy-12)+"px";
      e.style.setProperty("--rot",(ang*180/Math.PI+90)+"deg");
      e.innerHTML=footSVG;
      $("sprites").appendChild(e);stepEls.push(e);side*=-1;
    }
  }
  const [ex,ey]=pts[pts.length-1];
  zoneStarEl=document.createElement("div");zoneStarEl.className="zoneStar";
  zoneStarEl.innerHTML=zoneStarSVG;
  zoneStarEl.style.left=ex+"px";zoneStarEl.style.top=ey+"px";
  $("sprites").appendChild(zoneStarEl);
}

function fit(){viewW=innerWidth;viewH=innerHeight;
  scale=Math.min(Math.max(Math.min(viewW,viewH)/560,0.62),1.35);}
addEventListener("resize",fit);
function camera(){
  let tx=viewW/2-px*scale, ty=viewH/2-py*scale;
  tx=Math.min(20*scale,Math.max(viewW-1300*scale,tx));
  ty=Math.min(20*scale,Math.max(viewH-980*scale,ty));
  if(1280*scale<viewW-40)tx=(viewW-1280*scale)/2;
  if(960*scale<viewH-40)ty=(viewH-960*scale)/2;
  camX=tx;camY=ty;
  $("world").style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
}
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  if(phase==="explore"){
    let vx=0,vy=0;
    if(keys.ArrowLeft||keys.a)vx-=1; if(keys.ArrowRight||keys.d)vx+=1;
    if(keys.ArrowUp||keys.w)vy-=1; if(keys.ArrowDown||keys.s)vy+=1;
    vx+=joyVec.x;vy+=joyVec.y;
    if(vx||vy)tapTarget=null;
    if(tapTarget){const dx=tapTarget.x-px,dy=tapTarget.y-py,d=Math.hypot(dx,dy);
      if(d<8)tapTarget=null;else{vx=dx/d;vy=dy/d;}}
    const m=Math.hypot(vx,vy);
    if(m>0.15){
      vx/=Math.max(m,1);vy/=Math.max(m,1);
      const sp=215*dt;let nx=px+vx*sp,ny=py+vy*sp,moved=false;
      if(canStand(nx,py)){px=nx;moved=true;}
      if(canStand(px,ny)){py=ny;moved=true;}
      if(!moved&&tapTarget)tapTarget=null;
      if(vx>0.1)facing=1;if(vx<-0.1)facing=-1;
      $("player").classList.toggle("walk",moved);
    }else $("player").classList.remove("walk");
    const st=STAGES[stage];
    if(st&&st.trigger&&inRect(px,py,st.trigger))startEvent();
    $("player").style.left=px+"px";$("player").style.top=py+"px";
    $("playerSVG").style.setProperty("--flip",facing<0?"scaleX(-1)":"scaleX(1)");
  }
  camera();
  requestAnimationFrame(loop);
}

function courtRect(){return $("court").getBoundingClientRect();}
function trajectory(u){ /* 포물선(중력) 비행 경로 */
  const c=courtRect(),w=c.width,h=c.height;
  const x0=0.95*w,y0=0.30*h, x1=0.305*w,y1=0.80*h, cx=0.62*w,cy=-0.04*h;
  const iu=1-u;
  const x=iu*iu*x0+2*iu*u*cx+u*u*x1, y=iu*iu*y0+2*iu*u*cy+u*u*y1;
  const dx=2*iu*(cx-x0)+2*u*(x1-cx), dy=2*iu*(cy-y0)+2*u*(y1-cy); // 속도 벡터
  return{x,y,rot:Math.atan2(dy,dx)*180/Math.PI+90,w,h};
}

  const floorY=p.h*0.875, k=Math.max(0.2,1-(floorY-p.y)/(p.h*0.65));

  }
};

/* ═══════════ 보상 ═══════════ */
const REVIEW=[
  {svg:()=>SCENES.s1A,cap:"하나. 시간표를 보고 체육 시간을 확인했어요"},
  {svg:()=>SCENES.s2A,cap:"둘. 선생님과 나란히 안전하게 걸었어요"},
  {svg:()=>SCENES.s3A,cap:"셋. 선생님의 안내를 귀 기울여 들었어요"},
  {svg:()=>SCENES.s4A,cap:"넷. 셔틀콕을 10번이나 멋지게 쳤어요"},
  {svg:()=>SCENES.s5A,cap:"다섯. 일과대로 교실에 잘 돌아왔어요"},
];
const CHEERS=[
  "조금 어렵고 낯설어도 차근차근 해낸 우리 친구, 정말 최고예요. 진짜 체육 시간에도 오늘처럼 멋지게 해 볼까요? 다음 모험에서 또 만나요.",
  "두 번째 모험도 대성공. 연습할수록 점점 더 씩씩해지는 우리 친구, 정말 자랑스러워요.",
  "와, 또 해냈어요. 이제 체육 시간 규칙은 우리 친구가 박사님이에요.",
  "몇 번을 해도 늘 멋지게 해내는 우리 친구. 오늘도 별 다섯 개가 반짝반짝 빛나요.",
];
let rvIdx=0;
function showReward(){
  phase="reward";playCount++;
  $("gameScreen").classList.remove("on");
  $("rewardScreen").classList.add("on");
  $("rwKidBox").innerHTML=kidSolo("cheer");
  $("trophyBox").classList.remove("show");
  document.querySelectorAll(".crownStar").forEach(e=>e.remove());
  sFanfare();confetti(110);
  speak("참 잘했어요. 오늘 우리 친구는 시간표를 보고, 선생님과 함께 강당에 가서, 멋지게 과제를 해냈어요.");
  const stEl=$("rwStage"),W=stEl.clientWidth,H=stEl.clientHeight;
  for(let i=0;i<5;i++){
    const e=document.createElement("div");e.className="crownStar";
    e.innerHTML=goldStar(true).replace('class="slot got"','');
    const a=Math.PI*(0.16+0.17*i);
    e.style.left=(W/2-Math.cos(a)*W*0.27-17)+"px";
    e.style.bottom=(H*0.55+Math.sin(a)*46)+"px";
    stEl.appendChild(e);
    setTimeout(()=>{e.classList.add("land");sStar();},600+i*440);
  }
  setTimeout(()=>{$("trophyBox").classList.add("show");
    beep(784,0,.22,"triangle",.13);beep(1047,.18,.45,"triangle",.13);},3200);
  rvIdx=0;renderReview(false);
  $("rwCheer").textContent=CHEERS[(playCount-1)%CHEERS.length];
  $("againBtn").focus();
}
function renderReview(read){
  const r=REVIEW[rvIdx];
  $("reviewCard").innerHTML=r.svg();
  $("reviewCap").textContent=r.cap;
  $("reviewDots").textContent=REVIEW.map((_,i)=>i===rvIdx?"●":"○").join(" ");
  if(read)speak(r.cap);
}
$("rvPrev").onclick=()=>{rvIdx=(rvIdx+REVIEW.length-1)%REVIEW.length;renderReview(true);beep(523,0,.1);};
$("rvNext").onclick=()=>{rvIdx=(rvIdx+1)%REVIEW.length;renderReview(true);beep(659,0,.1);};

/* ═══════════ 시작 · 다시 하기 ═══════════ */
function resetGame(){
  stage=0;stars=0;wrongOnce=false;px=210;py=300;facing=1;tapTarget=null;
  for(const d of[1,2,3]){doorOpen[d]=false;renderDoor(d);}
  document.querySelectorAll("#starBar .slot").forEach(e=>e.classList.remove("got"));
  $("starBar").setAttribute("aria-label","모은 별 0개, 5개 중");
  clearPath();
  setGoal("통합반 교실에서 모험이 시작됩니다");
  $("player").style.left=px+"px";$("player").style.top=py+"px";
}
function beginAdventure(){
  $("titleScreen").classList.remove("on");
  $("rewardScreen").classList.remove("on");
  $("gameScreen").classList.add("on");
  phase="explore";
  setTimeout(()=>{if(phase==="explore")startEvent();},1000);
  setTimeout(()=>{$("tapHint").style.opacity="0";},7000);
}
$("startBtn").onclick=()=>{ac();sDing();beginAdventure();};
$("againBtn").onclick=()=>{ac();resetGame();sGood();beginAdventure();};

/* ═══════════ 초기화 ═══════════ */
drawWorld();makeDoors();drawCourtBG();fit();
$("starBar").innerHTML=goldStar(false)+goldStar(false)+goldStar(false)+goldStar(false)+goldStar(false);
setIcon("sndBtn",ICONS.sound(true));setIcon("voxBtn",ICONS.voice(true));applyMotion();
$("trophySVG").innerHTML=trophySVG;
$("playerSVG").innerHTML=kidSolo("stand");
$("playerSVG").style.setProperty("--flip","scaleX(1)");
$("dlgFace").innerHTML=kidSolo("stand",40);
$("player").style.left=px+"px";$("player").style.top=py+"px";
requestAnimationFrame(t=>{lastT=t;requestAnimationFrame(loop);});
</script>
</body>
